<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600" viewBox="0 0 1400 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a192f"/>
      <stop offset="50%" style="stop-color:#112240"/>
      <stop offset="100%" style="stop-color:#0a192f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#64ffda;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#64ffda;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1400" height="600" fill="url(#bg)"/>
  <!-- Kanban columns -->
  <g opacity="0.15">
    <rect x="150" y="80" width="300" height="350" rx="12" fill="none" stroke="#64ffda" stroke-width="1"/>
    <rect x="550" y="80" width="300" height="350" rx="12" fill="none" stroke="#64ffda" stroke-width="1"/>
    <rect x="950" y="80" width="300" height="350" rx="12" fill="none" stroke="#64ffda" stroke-width="1"/>
  </g>
  <!-- Column headers -->
  <text x="300" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64ffda" opacity="0.6" letter-spacing="2">BACKLOG</text>
  <text x="700" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64ffda" opacity="0.6" letter-spacing="2">IN PROGRESS</text>
  <text x="1100" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64ffda" opacity="0.6" letter-spacing="2">DONE</text>
  <!-- Task cards -->
  <g opacity="0.3">
    <rect x="180" y="145" width="240" height="50" rx="8" fill="#112240" stroke="#64ffda" stroke-width="0.5"/>
    <rect x="180" y="210" width="240" height="50" rx="8" fill="#112240" stroke="#64ffda" stroke-width="0.5"/>
    <rect x="180" y="275" width="240" height="50" rx="8" fill="#112240" stroke="#64ffda" stroke-width="0.5"/>
    <rect x="580" y="145" width="240" height="50" rx="8" fill="#112240" stroke="#64ffda" stroke-width="0.8"/>
    <rect x="580" y="210" width="240" height="50" rx="8" fill="#112240" stroke="#64ffda" stroke-width="0.8"/>
    <rect x="980" y="145" width="240" height="50" rx="8" fill="#112240" stroke="#64ffda" stroke-width="0.5"/>
    <rect x="980" y="210" width="240" height="50" rx="8" fill="#112240" stroke="#64ffda" stroke-width="0.5"/>
    <rect x="980" y="275" width="240" height="50" rx="8" fill="#112240" stroke="#64ffda" stroke-width="0.5"/>
    <rect x="980" y="340" width="240" height="50" rx="8" fill="#112240" stroke="#64ffda" stroke-width="0.5"/>
  </g>
  <!-- Card content lines -->
  <g opacity="0.2" fill="#ccd6f6">
    <rect x="195" y="162" width="120" height="4" rx="2"/><rect x="195" y="175" width="80" height="4" rx="2"/>
    <rect x="195" y="227" width="140" height="4" rx="2"/><rect x="195" y="240" width="60" height="4" rx="2"/>
    <rect x="595" y="162" width="130" height="4" rx="2"/><rect x="595" y="175" width="90" height="4" rx="2"/>
    <rect x="995" y="162" width="110" height="4" rx="2"/><rect x="995" y="175" width="70" height="4" rx="2"/>
  </g>
  <!-- Active card glow -->
  <rect x="578" y="143" width="244" height="54" rx="9" fill="none" stroke="#64ffda" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <!-- Flow arrows -->
  <path d="M430 170 L540 170" stroke="#64ffda" stroke-width="1.5" opacity="0.25" marker-end="url(#arrow)"/>
  <path d="M830 170 L940 170" stroke="#64ffda" stroke-width="1.5" opacity="0.25"/>
  <!-- Title -->
  <text x="700" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ccd6f6" letter-spacing="2">TaskFlow</text>
  <text x="700" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64ffda" letter-spacing="4" opacity="0.8">PROJECT MANAGEMENT</text>
  <rect x="550" y="540" width="300" height="2" fill="url(#accent)" rx="1"/>
</svg>
