<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a192f"/>
      <stop offset="100%" stop-color="#112240"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="600" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#64ffda" stroke-width="0.5">
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/><line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1000" y1="0" x2="1000" y2="600"/><line x1="1200" y1="0" x2="1200" y2="600"/>
    <line x1="0" y1="100" x2="1400" y2="100"/><line x1="0" y1="200" x2="1400" y2="200"/>
    <line x1="0" y1="300" x2="1400" y2="300"/><line x1="0" y1="400" x2="1400" y2="400"/>
    <line x1="0" y1="500" x2="1400" y2="500"/>
  </g>
  <!-- Code editor mock -->
  <rect x="350" y="80" width="700" height="440" rx="16" fill="#112240" stroke="#233554" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="350" y="80" width="700" height="40" rx="16" fill="#1a3050"/>
  <rect x="350" y="104" width="700" height="16" fill="#1a3050"/>
  <circle cx="378" cy="100" r="6" fill="#ff5f57"/><circle cx="398" cy="100" r="6" fill="#febc2e"/>
  <circle cx="418" cy="100" r="6" fill="#28c840"/>
  <!-- Code lines -->
  <g font-family="monospace" font-size="14">
    <text x="380" y="155" fill="#64ffda" opacity="0.8">const</text>
    <text x="420" y="155" fill="#ccd6f6"> analyzeCode</text>
    <text x="530" y="155" fill="#64ffda"> =</text>
    <text x="545" y="155" fill="#c792ea"> async</text>
    <text x="590" y="155" fill="#ccd6f6"> (code) =&gt; {</text>
    <text x="400" y="180" fill="#8892b0">// AI-powered analysis</text>
    <text x="400" y="205" fill="#c792ea">const</text>
    <text x="440" y="205" fill="#ccd6f6"> result =</text>
    <text x="510" y="205" fill="#c792ea"> await</text>
    <text x="555" y="205" fill="#82aaff"> ai.review</text>
    <text x="635" y="205" fill="#ccd6f6">(code);</text>
    <text x="400" y="230" fill="#c792ea">return</text>
    <text x="450" y="230" fill="#ccd6f6"> {</text>
    <text x="420" y="255" fill="#64ffda">score</text>
    <text x="465" y="255" fill="#ccd6f6">: result.quality,</text>
    <text x="420" y="280" fill="#64ffda">issues</text>
    <text x="470" y="280" fill="#ccd6f6">: result.findings,</text>
    <text x="420" y="305" fill="#64ffda">suggestions</text>
    <text x="520" y="305" fill="#ccd6f6">: result.improve</text>
    <text x="400" y="330" fill="#ccd6f6">};</text>
    <text x="380" y="355" fill="#ccd6f6">};</text>
  </g>
  <!-- AI analysis panel -->
  <rect x="780" y="160" width="240" height="320" rx="12" fill="#0d2137" stroke="url(#accent)" stroke-width="1" opacity="0.9"/>
  <text x="810" y="190" fill="#64ffda" font-family="sans-serif" font-size="13" font-weight="bold">AI ANALİZ SONUCU</text>
  <rect x="800" y="205" width="200" height="4" rx="2" fill="#233554"/>
  <rect x="800" y="205" width="170" height="4" rx="2" fill="url(#accent)"/>
  <text x="810" y="235" fill="#ccd6f6" font-family="sans-serif" font-size="12">Kod Kalitesi: 94/100</text>
  <text x="810" y="260" fill="#28c840" font-family="sans-serif" font-size="11">✓ Güvenlik kontrolü geçti</text>
  <text x="810" y="280" fill="#28c840" font-family="sans-serif" font-size="11">✓ Performans optimize</text>
  <text x="810" y="300" fill="#febc2e" font-family="sans-serif" font-size="11">⚠ 2 iyileştirme önerisi</text>
  <text x="810" y="320" fill="#28c840" font-family="sans-serif" font-size="11">✓ Best practice uyumlu</text>
  <!-- Pulse circles -->
  <circle cx="700" cy="300" r="180" stroke="url(#accent)" stroke-width="0.5" opacity="0.08"/>
  <circle cx="700" cy="300" r="240" stroke="url(#accent)" stroke-width="0.5" opacity="0.05"/>
  <circle cx="700" cy="300" r="300" stroke="url(#purple)" stroke-width="0.5" opacity="0.03"/>
  <!-- Brand text -->
  <text x="700" y="570" fill="#64ffda" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle" letter-spacing="4">CODEPULSE</text>
</svg>
