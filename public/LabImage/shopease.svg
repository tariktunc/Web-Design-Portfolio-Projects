<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600" viewBox="0 0 1400 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a192f"/>
      <stop offset="50%" style="stop-color:#112240"/>
      <stop offset="100%" style="stop-color:#0a192f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#64ffda;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#64ffda;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1400" height="600" fill="url(#bg)"/>
  <!-- Shopping cart icon -->
  <g transform="translate(700, 200)" opacity="0.25" stroke="#64ffda" fill="none" stroke-width="2">
    <path d="M-80 -40 L-60 -40 L-30 60 L70 60" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="-25" y="-20" width="90" height="65" rx="6"/>
    <circle cx="-15" cy="80" r="10"/><circle cx="55" cy="80" r="10"/>
    <!-- Product boxes inside cart -->
    <rect x="-15" y="-5" width="25" height="35" rx="3" fill="#64ffda" opacity="0.15"/>
    <rect x="18" y="5" width="25" height="25" rx="3" fill="#64ffda" opacity="0.1"/>
    <rect x="48" y="-5" width="12" height="35" rx="3" fill="#64ffda" opacity="0.12"/>
  </g>
  <!-- Price tags floating -->
  <g opacity="0.15" fill="none" stroke="#64ffda" stroke-width="1">
    <rect x="200" y="120" width="120" height="60" rx="8"/><text x="260" y="158" text-anchor="middle" font-family="monospace" font-size="18" fill="#64ffda" opacity="0.5">$149</text>
    <rect x="1080" y="140" width="120" height="60" rx="8"/><text x="1140" y="178" text-anchor="middle" font-family="monospace" font-size="18" fill="#64ffda" opacity="0.5">$299</text>
    <rect x="300" y="320" width="100" height="50" rx="8"/><text x="350" y="352" text-anchor="middle" font-family="monospace" font-size="16" fill="#64ffda" opacity="0.4">$79</text>
    <rect x="1000" y="300" width="100" height="50" rx="8"/><text x="1050" y="332" text-anchor="middle" font-family="monospace" font-size="16" fill="#64ffda" opacity="0.4">$199</text>
  </g>
  <!-- Analytics line chart -->
  <g transform="translate(350, 350)" opacity="0.12">
    <polyline points="0,60 100,40 200,50 300,20 400,30 500,5 600,15 700,0" fill="none" stroke="#64ffda" stroke-width="2"/>
    <line x1="0" y1="60" x2="700" y2="60" stroke="#64ffda" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Title -->
  <text x="700" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ccd6f6" letter-spacing="2">ShopEase</text>
  <text x="700" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64ffda" letter-spacing="4" opacity="0.8">E-COMMERCE PLATFORM</text>
  <rect x="550" y="540" width="300" height="2" fill="url(#accent)" rx="1"/>
</svg>
