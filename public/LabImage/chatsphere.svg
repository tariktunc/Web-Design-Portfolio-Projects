<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600" viewBox="0 0 1400 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a192f"/>
      <stop offset="50%" style="stop-color:#112240"/>
      <stop offset="100%" style="stop-color:#0a192f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#64ffda;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#64ffda;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1400" height="600" fill="url(#bg)"/>
  <!-- Chat bubbles -->
  <g opacity="0.25">
    <!-- Left bubbles (incoming) -->
    <rect x="250" y="100" width="280" height="50" rx="25" fill="none" stroke="#64ffda" stroke-width="1.2"/>
    <g opacity="0.4" fill="#ccd6f6"><rect x="275" y="118" width="140" height="4" rx="2"/><rect x="275" y="130" width="90" height="4" rx="2"/></g>
    <rect x="250" y="170" width="200" height="50" rx="25" fill="none" stroke="#64ffda" stroke-width="1.2"/>
    <g opacity="0.4" fill="#ccd6f6"><rect x="275" y="190" width="100" height="4" rx="2"/></g>
    <!-- Right bubbles (outgoing) -->
    <rect x="870" y="130" width="280" height="50" rx="25" fill="#64ffda" fill-opacity="0.08" stroke="#64ffda" stroke-width="1.2"/>
    <g opacity="0.5" fill="#64ffda"><rect x="895" y="148" width="160" height="4" rx="2"/><rect x="895" y="160" width="100" height="4" rx="2"/></g>
    <rect x="920" y="200" width="230" height="50" rx="25" fill="#64ffda" fill-opacity="0.08" stroke="#64ffda" stroke-width="1.2"/>
    <g opacity="0.5" fill="#64ffda"><rect x="945" y="220" width="120" height="4" rx="2"/></g>
    <!-- More bubbles -->
    <rect x="300" y="260" width="320" height="50" rx="25" fill="none" stroke="#64ffda" stroke-width="1"/>
    <g opacity="0.3" fill="#ccd6f6"><rect x="325" y="278" width="170" height="4" rx="2"/><rect x="325" y="290" width="110" height="4" rx="2"/></g>
    <rect x="850" y="290" width="300" height="50" rx="25" fill="#64ffda" fill-opacity="0.06" stroke="#64ffda" stroke-width="1"/>
    <g opacity="0.4" fill="#64ffda"><rect x="875" y="310" width="140" height="4" rx="2"/></g>
  </g>
  <!-- Typing indicator -->
  <g transform="translate(310, 340)" opacity="0.4">
    <rect x="0" y="0" width="80" height="35" rx="17" fill="none" stroke="#64ffda" stroke-width="1"/>
    <circle cx="22" cy="17" r="4" fill="#64ffda" opacity="0.8"/>
    <circle cx="40" cy="17" r="4" fill="#64ffda" opacity="0.5"/>
    <circle cx="58" cy="17" r="4" fill="#64ffda" opacity="0.3"/>
  </g>
  <!-- Connection pulse rings -->
  <circle cx="700" cy="220" r="60" fill="none" stroke="#64ffda" stroke-width="0.8" opacity="0.1"/>
  <circle cx="700" cy="220" r="100" fill="none" stroke="#64ffda" stroke-width="0.5" opacity="0.06"/>
  <circle cx="700" cy="220" r="140" fill="none" stroke="#64ffda" stroke-width="0.3" opacity="0.04"/>
  <!-- Online indicator dots -->
  <circle cx="240" cy="115" r="6" fill="#64ffda" opacity="0.6" filter="url(#glow)"/>
  <circle cx="1160" cy="145" r="6" fill="#64ffda" opacity="0.6" filter="url(#glow)"/>
  <!-- Title -->
  <text x="700" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ccd6f6" letter-spacing="2">ChatSphere</text>
  <text x="700" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64ffda" letter-spacing="4" opacity="0.8">REAL-TIME MESSAGING</text>
  <rect x="550" y="540" width="300" height="2" fill="url(#accent)" rx="1"/>
</svg>
