<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1400" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a192f"/>
      <stop offset="100%" stop-color="#0f2940"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0077b6"/>
      <stop offset="100%" stop-color="#0a192f"/>
    </linearGradient>
    <linearGradient id="green2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64ffda"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="600" fill="url(#bg2)"/>
  <!-- World map simplified outline -->
  <g opacity="0.06" stroke="#64ffda" stroke-width="1.2" fill="none">
    <!-- Europe/Africa -->
    <path d="M620 120 L650 110 L680 115 L700 130 L710 160 L690 200 L670 220 L660 280 L680 340 L670 400 L650 420 L620 380 L610 320 L620 260 L600 200 L610 160 Z"/>
    <!-- Americas -->
    <path d="M280 100 L320 90 L350 120 L360 180 L340 240 L350 300 L380 360 L370 420 L340 460 L300 440 L280 380 L260 300 L270 220 L260 160 Z"/>
    <!-- Asia -->
    <path d="M780 100 L850 90 L920 100 L980 130 L1020 110 L1060 120 L1100 160 L1080 220 L1040 260 L980 280 L920 260 L860 240 L800 200 L780 160 Z"/>
    <!-- Australia -->
    <path d="M1020 360 L1080 340 L1120 360 L1100 400 L1060 420 L1020 400 Z"/>
  </g>
  <!-- Map dots (cities) -->
  <g>
    <circle cx="660" cy="180" r="5" fill="#64ffda" opacity="0.9"/><!-- Istanbul -->
    <circle cx="640" cy="150" r="4" fill="#00b4d8" opacity="0.7"/><!-- Paris -->
    <circle cx="680" cy="145" r="4" fill="#00b4d8" opacity="0.7"/><!-- Berlin -->
    <circle cx="300" cy="200" r="4" fill="#00b4d8" opacity="0.7"/><!-- New York -->
    <circle cx="920" cy="190" r="4" fill="#00b4d8" opacity="0.7"/><!-- Tokyo -->
    <circle cx="1060" cy="380" r="4" fill="#00b4d8" opacity="0.7"/><!-- Sydney -->
    <circle cx="620" cy="160" r="4" fill="#00b4d8" opacity="0.7"/><!-- London -->
    <circle cx="850" cy="250" r="4" fill="#00b4d8" opacity="0.7"/><!-- Dubai -->
  </g>
  <!-- Connection lines (routes) -->
  <g stroke="#64ffda" stroke-width="1" opacity="0.15">
    <path d="M660 180 Q500 100 300 200" stroke-dasharray="6 4"/>
    <path d="M660 180 Q780 140 920 190" stroke-dasharray="6 4"/>
    <path d="M660 180 Q750 250 850 250" stroke-dasharray="6 4"/>
    <path d="M920 190 Q1000 280 1060 380" stroke-dasharray="6 4"/>
    <path d="M660 180 L640 150" stroke-dasharray="4 3"/>
    <path d="M660 180 L680 145" stroke-dasharray="4 3"/>
    <path d="M660 180 L620 160" stroke-dasharray="4 3"/>
  </g>
  <!-- Pulse rings around Istanbul -->
  <circle cx="660" cy="180" r="20" stroke="#64ffda" stroke-width="1" opacity="0.3"/>
  <circle cx="660" cy="180" r="40" stroke="#64ffda" stroke-width="0.8" opacity="0.15"/>
  <circle cx="660" cy="180" r="60" stroke="#64ffda" stroke-width="0.5" opacity="0.08"/>
  <!-- Info card -->
  <rect x="100" y="360" width="340" height="180" rx="14" fill="#112240" stroke="#233554" stroke-width="1"/>
  <text x="130" y="395" fill="#64ffda" font-family="sans-serif" font-size="14" font-weight="bold">Seyahat Planı</text>
  <text x="130" y="420" fill="#ccd6f6" font-family="sans-serif" font-size="12">İstanbul → Paris → Berlin</text>
  <rect x="130" y="435" width="280" height="3" rx="1.5" fill="#233554"/>
  <rect x="130" y="435" width="190" height="3" rx="1.5" fill="url(#green2)"/>
  <text x="130" y="460" fill="#8892b0" font-family="sans-serif" font-size="11">Süre: 14 gün • 3 şehir • 8 etkinlik</text>
  <text x="130" y="480" fill="#8892b0" font-family="sans-serif" font-size="11">Bütçe: ₺45.000 • Uçuş + Konaklama</text>
  <rect x="130" y="495" width="100" height="28" rx="6" fill="url(#green2)" opacity="0.15"/>
  <text x="155" y="514" fill="#64ffda" font-family="sans-serif" font-size="11" font-weight="bold">Planla →</text>
  <!-- Stats -->
  <rect x="960" y="360" width="340" height="180" rx="14" fill="#112240" stroke="#233554" stroke-width="1"/>
  <text x="990" y="395" fill="#64ffda" font-family="sans-serif" font-size="14" font-weight="bold">Platform İstatistikleri</text>
  <text x="990" y="425" fill="#ccd6f6" font-family="sans-serif" font-size="24" font-weight="bold">2.4M+</text>
  <text x="1090" y="425" fill="#8892b0" font-family="sans-serif" font-size="12">aktif kullanıcı</text>
  <text x="990" y="460" fill="#ccd6f6" font-family="sans-serif" font-size="24" font-weight="bold">180+</text>
  <text x="1050" y="460" fill="#8892b0" font-family="sans-serif" font-size="12">ülke desteği</text>
  <text x="990" y="495" fill="#ccd6f6" font-family="sans-serif" font-size="24" font-weight="bold">50K+</text>
  <text x="1060" y="495" fill="#8892b0" font-family="sans-serif" font-size="12">rota planlandı</text>
  <!-- Brand -->
  <text x="700" y="570" fill="#64ffda" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle" letter-spacing="4">TRAVELMAP</text>
</svg>
