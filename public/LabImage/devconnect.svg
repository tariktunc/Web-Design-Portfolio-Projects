<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600" viewBox="0 0 1400 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a192f"/>
      <stop offset="50%" style="stop-color:#112240"/>
      <stop offset="100%" style="stop-color:#0a192f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#64ffda;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#64ffda;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1400" height="600" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#64ffda" stroke-width="0.5">
    <line x1="0" y1="100" x2="1400" y2="100"/><line x1="0" y1="200" x2="1400" y2="200"/>
    <line x1="0" y1="300" x2="1400" y2="300"/><line x1="0" y1="400" x2="1400" y2="400"/>
    <line x1="0" y1="500" x2="1400" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/><line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1000" y1="0" x2="1000" y2="600"/><line x1="1200" y1="0" x2="1200" y2="600"/>
  </g>
  <!-- Connection nodes -->
  <circle cx="350" cy="200" r="40" fill="none" stroke="#64ffda" stroke-width="1.5" opacity="0.4"/>
  <circle cx="350" cy="200" r="8" fill="#64ffda" opacity="0.6" filter="url(#glow)"/>
  <circle cx="700" cy="150" r="50" fill="none" stroke="#64ffda" stroke-width="1.5" opacity="0.3"/>
  <circle cx="700" cy="150" r="10" fill="#64ffda" opacity="0.5" filter="url(#glow)"/>
  <circle cx="1050" cy="220" r="35" fill="none" stroke="#64ffda" stroke-width="1.5" opacity="0.4"/>
  <circle cx="1050" cy="220" r="7" fill="#64ffda" opacity="0.6" filter="url(#glow)"/>
  <circle cx="500" cy="380" r="30" fill="none" stroke="#64ffda" stroke-width="1.5" opacity="0.3"/>
  <circle cx="500" cy="380" r="6" fill="#64ffda" opacity="0.5" filter="url(#glow)"/>
  <circle cx="900" cy="350" r="45" fill="none" stroke="#64ffda" stroke-width="1.5" opacity="0.35"/>
  <circle cx="900" cy="350" r="9" fill="#64ffda" opacity="0.55" filter="url(#glow)"/>
  <!-- Connection lines -->
  <line x1="358" y1="200" x2="690" y2="155" stroke="#64ffda" stroke-width="1" opacity="0.2"/>
  <line x1="710" y1="155" x2="1043" y2="220" stroke="#64ffda" stroke-width="1" opacity="0.2"/>
  <line x1="355" y1="208" x2="494" y2="375" stroke="#64ffda" stroke-width="1" opacity="0.15"/>
  <line x1="506" y1="380" x2="891" y2="350" stroke="#64ffda" stroke-width="1" opacity="0.15"/>
  <line x1="705" y1="158" x2="895" y2="342" stroke="#64ffda" stroke-width="1" opacity="0.15"/>
  <!-- Title -->
  <text x="700" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ccd6f6" letter-spacing="2">DevConnect</text>
  <text x="700" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64ffda" letter-spacing="4" opacity="0.8">DEVELOPER SOCIAL NETWORK</text>
  <!-- Accent line -->
  <rect x="550" y="540" width="300" height="2" fill="url(#accent)" rx="1"/>
</svg>
